<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión de Tipos de Habitación - My Rouse Hotel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            body { background-color: #f8f9fa; }
            .navbar-custom { background-color: #2c3e50; }
            .modal-header-custom { background-color: #1a252f; color: white; }
            .navbar-custom .nav-link {
                color: rgba(255,255,255,0.75);
                font-weight: 500;
                padding: 0.5rem 1rem;
            }
            .navbar-custom .nav-link:hover { color: #ffffff; }
            .navbar-custom .nav-link.active {
                color: #ffffff;
                border-bottom: 2px solid #3498db;
            }
        </style>
    </head>
    <body>

                <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="/"><i class="fa-solid fa-hotel me-2"></i>My Rouse Hotel</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
                            <a class="nav-link" href="/checkin-vista"><i class="fa-solid fa-bolt me-1"></i>Check-in Rápido</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/habitaciones-vista"><i class="fa-solid fa-bed me-1"></i>Habitaciones</a>
                        </li>
                        <li class="nav-item dropdown" sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
                            <a class="nav-link dropdown-toggle active" href="#" id="menuGestionDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fa-solid fa-list-check me-1"></i>Gestión
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="menuGestionDropdown">
                                <li><a class="dropdown-item" href="/clientes-vista"><i class="fa-solid fa-users me-2"></i>Clientes</a></li>
                                <li><a class="dropdown-item" href="/reservas-vista"><i class="fa-solid fa-calendar-check me-2"></i>Reservas</a></li>
                                <li><a class="dropdown-item active" href="/tipohabitacion-vista"><i class="fa-solid fa-tags me-2"></i>Tipos de Habitación</a></li>
                                <li><a class="dropdown-item" href="/pagos-vista"><i class="fa-solid fa-money-check-dollar me-2"></i>Pagos</a></li>
                                <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"></li>
                                <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" href="/finanzas-vista"><i class="fa-solid fa-coins me-2"></i>Finanzas</a></li>
                            </ul>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3 ms-3">
                        <span class="text-light small">
                            <i class="fa-solid fa-user-circle me-1"></i>
                            <span sec:authentication="name">usuario</span>
                            <span class="badge bg-secondary ms-1" sec:authentication="principal.nombreRol">ROL</span>
                        </span>
                        <form th:action="@{/logout}" method="post" class="mb-0">
                            <button type="submit" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-right-from-bracket me-1"></i>Salir</button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0 text-dark"><i class="fa-solid fa-bed me-2"></i>Tipos de Habitación</h5>
                    <button class="btn btn-primary" onclick="abrirModalNuevo()">
                        <i class="fa-solid fa-plus me-2"></i>Nuevo Tipo
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0 align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre del Tipo</th>
                                    <th>Precio por Noche</th>
                                    <th>Capacidad (personas)</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaTipos">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalTipo" data-bs-backdrop="static" tabindex="-1" aria-labelledby="form-title" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content shadow-lg border-0">
                    <div class="modal-header modal-header-custom">
                        <h5 class="modal-title" id="form-title"><i class="fa-solid fa-plus me-2"></i>Registrar Tipo de Habitación</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="tipoForm">
                        <div class="modal-body p-4">
                            <div class="row g-3">
                                <input type="hidden" id="idTipo">

                                <div class="col-12">
                                    <label for="nombreTipo" class="form-label font-monospace small text-secondary">NOMBRE DEL TIPO</label>
                                    <input type="text" class="form-control" id="nombreTipo" required placeholder="Ej: Suite Ejecutiva">
                                </div>
                                <div class="col-md-6">
                                    <label for="precioPorNoche" class="form-label font-monospace small text-secondary">PRECIO POR NOCHE (S/.)</label>
                                    <input type="number" step="0.01" min="0" class="form-control" id="precioPorNoche" required placeholder="0.00">
                                </div>
                                <div class="col-md-6">
                                    <label for="capacidadPersonas" class="form-label font-monospace small text-secondary">CAPACIDAD (PERSONAS)</label>
                                    <input type="number" step="1" min="1" class="form-control" id="capacidadPersonas" required placeholder="Ej: 2">
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer bg-light p-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success px-4"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            const API_URL = "/api/tipohabitaciones";
            let bootstrapModal;
            let esEdicion = false;

            document.addEventListener("DOMContentLoaded", () => {
                bootstrapModal = new bootstrap.Modal(document.getElementById('modalTipo'));
                listarTipos();
                document.getElementById("tipoForm").addEventListener("submit", guardarTipo);
            });

            async function listarTipos() {
                try {
                    const respuesta = await fetch(API_URL);
                    const tipos     = await respuesta.json();
                    const tabla     = document.getElementById("tablaTipos");
                    tabla.innerHTML = "";

                    tipos.forEach(tipo => {
                        tabla.innerHTML += `
                        <tr>
                            <td>${tipo.idTipo}</td>
                            <td>${tipo.nombreTipo}</td>
                            <td>S/. ${Number(tipo.precioPorNoche).toFixed(2)}</td>
                            <td>${tipo.capacidadPersonas}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-warning me-1" onclick="cargarTipo('${tipo.idTipo}')"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="eliminarTipo('${tipo.idTipo}')"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>`;
                    });
                } catch (error) {
                    console.error("Error al listar tipos de habitación:", error);
                }
            }

            function abrirModalNuevo() {
                document.getElementById("tipoForm").reset();
                document.getElementById("idTipo").value = "";
                esEdicion = false;
                document.getElementById("form-title").innerHTML = '<i class="fa-solid fa-plus me-2"></i>Registrar Tipo de Habitación';
                bootstrapModal.show();
            }

            function validarCampos(data) {
                if (!data.nombreTipo || data.nombreTipo.trim() === "")
                    return "El nombre del tipo de habitación es obligatorio.";
                if (data.precioPorNoche === null || isNaN(data.precioPorNoche) || data.precioPorNoche <= 0)
                    return "El precio por noche debe ser un número mayor a 0.";
                if (data.capacidadPersonas === null || isNaN(data.capacidadPersonas) || data.capacidadPersonas <= 0)
                    return "La capacidad debe ser un número entero mayor a 0.";
                return null;
            }

            async function guardarTipo(event) {
                event.preventDefault();

                const idActual = document.getElementById("idTipo").value;

                const datosTipo = {
                    idTipo:            esEdicion ? parseInt(idActual) : null,
                    nombreTipo:        document.getElementById("nombreTipo").value.trim(),
                    precioPorNoche:    parseFloat(document.getElementById("precioPorNoche").value),
                    capacidadPersonas: parseInt(document.getElementById("capacidadPersonas").value)
                };

                const errorValidacion = validarCampos(datosTipo);
                if (errorValidacion) {
                    Swal.fire({ icon: 'warning', title: 'Control de Validación', text: errorValidacion, confirmButtonColor: '#2c3e50' });
                    return;
                }

                try {
                    const url    = esEdicion ? `${API_URL}/${idActual}` : API_URL;
                    const metodo = esEdicion ? "PUT" : "POST";

                    const respuesta = await fetch(url, {
                        method: metodo,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(datosTipo)
                    });

                    if (respuesta.ok) {
                        bootstrapModal.hide();
                        Swal.fire({ icon: 'success', title: esEdicion ? '¡Actualizado!' : '¡Registrado!', text: esEdicion ? 'El tipo de habitación se actualizó con éxito.' : 'El tipo de habitación se registró con éxito.', timer: 2000, showConfirmButton: false });
                        listarTipos();
                    } else {
                        const errorData = await respuesta.json().catch(() => ({}));
                        Swal.fire({ icon: 'error', title: 'Error en Servidor', text: errorData.message || 'Error interno al procesar la solicitud.', confirmButtonColor: '#e74c3c' });
                    }
                } catch (error) {
                    Swal.fire({ icon: 'error', title: 'Sin Conexión', text: 'Hubo un fallo de comunicación con el servidor.' });
                }
            }

            async function eliminarTipo(id) {
                Swal.fire({
                    title: '¿Confirmar eliminación?',
                    text: "Esta acción eliminará el tipo de habitación permanentemente. No se podrá eliminar si hay habitaciones asignadas.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e74c3c',
                    cancelButtonColor:  '#7f8c8d',
                    confirmButtonText: 'Sí, eliminar',
                    cancelButtonText:  'Cancelar'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        try {
                            const respuesta = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                            if (respuesta.ok) {
                                Swal.fire({ icon: 'success', title: 'Eliminado', text: 'El tipo de habitación fue eliminado.', timer: 1500, showConfirmButton: false });
                                listarTipos();
                            } else {
                                Swal.fire({ icon: 'error', title: 'No se pudo eliminar', text: 'Puede que existan habitaciones usando este tipo.' });
                            }
                        } catch (error) {
                            Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo completar la operación.' });
                        }
                    }
                });
            }

            async function cargarTipo(id) {
                try {
                    const respuesta = await fetch(`${API_URL}/${id}`);
                    if (respuesta.ok) {
                        const tipo = await respuesta.json();

                        document.getElementById("idTipo").value            = tipo.idTipo;
                        esEdicion = true;

                        document.getElementById("nombreTipo").value        = tipo.nombreTipo;
                        document.getElementById("precioPorNoche").value    = tipo.precioPorNoche;
                        document.getElementById("capacidadPersonas").value = tipo.capacidadPersonas;

                        document.getElementById("form-title").innerHTML = '<i class="fa-solid fa-pen-to-square me-2"></i>Editar Tipo de Habitación';
                        bootstrapModal.show();
                    }
                } catch (error) {
                    console.error("Error al cargar tipo de habitación:", error);
                }
            }
        </script>
    </body>
</html>
