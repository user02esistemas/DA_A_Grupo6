<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - My Rouse Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }
        .login-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: #eaf2fb;
            color: #2980b9;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 14px auto;
        }
        .login-title { text-align: center; font-weight: 700; color: #1a252f; margin-bottom: 4px; }
        .login-subtitle { text-align: center; color: #7f8c8d; font-size: 0.85rem; margin-bottom: 28px; }
        .btn-login {
            background-color: #2c3e50;
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px;
        }
        .btn-login:hover { background-color: #1a252f; color: #fff; }
        .form-label { font-size: 0.8rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.4px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon"><i class="fa-solid fa-hotel"></i></div>
    <h4 class="login-title">My Rouse Hotel</h4>
    <p class="login-subtitle">Sistema de Gestión Hotelera</p>

    <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i>Usuario o contraseña incorrectos, o la cuenta está deshabilitada.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i>Sesión cerrada correctamente.
    </div>
    <div th:if="${param.sinPermiso}" class="alert alert-warning py-2 small" role="alert">
        <i class="fa-solid fa-lock me-1"></i>No tienes permisos para acceder a esa sección.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Nombre de usuario" required autofocus>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login w-100">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
        </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">Roles del sistema: Administrador · Recepcionista · Limpieza</p>
</div>

</body>
</html>
